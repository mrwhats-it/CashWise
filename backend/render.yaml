services:
  - type: web
    name: cashwise-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OLLAMA_URL
        sync: false
      - key: OLLAMA_MODEL
        value: gemma4:e2b
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: qwen/qwen3-32b
      - key: CORS_ORIGINS
        sync: false
